<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow4" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#059669"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="#F9FAFB" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#111827" font-family="Space Grotesk, sans-serif">RFQ Brokerage Flow</text>

  <!-- Three columns -->
  <!-- Column 1: Your App -->
  <rect x="50" y="60" width="180" height="44" rx="10" fill="#2563EB" filter="url(#shadow4)"/>
  <text x="140" y="87" text-anchor="middle" font-size="13" font-weight="600" fill="#FFF">Your Application</text>

  <!-- Column 2: BlankFX RFQ -->
  <rect x="310" y="60" width="180" height="44" rx="10" fill="#1D4ED8" filter="url(#shadow4)"/>
  <text x="400" y="87" text-anchor="middle" font-size="13" font-weight="600" fill="#FFF">BlankFX RFQ</text>

  <!-- Column 3: Market Makers -->
  <rect x="570" y="60" width="180" height="44" rx="10" fill="#059669" filter="url(#shadow4)"/>
  <text x="660" y="87" text-anchor="middle" font-size="13" font-weight="600" fill="#FFF">Market Makers</text>

  <!-- Vertical lines -->
  <line x1="140" y1="108" x2="140" y2="370" stroke="#E5E7EB" stroke-width="1.5"/>
  <line x1="400" y1="108" x2="400" y2="370" stroke="#E5E7EB" stroke-width="1.5"/>
  <line x1="660" y1="108" x2="660" y2="370" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Step 1: Request quote -->
  <circle cx="140" cy="140" r="14" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="140" y="144" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">1</text>
  <line x1="158" y1="140" x2="384" y2="140" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <text x="270" y="133" text-anchor="middle" font-size="10" fill="#2563EB" font-weight="500">Request quote</text>
  <text x="270" y="155" text-anchor="middle" font-size="9" fill="#6B7280">pair + amount + side</text>

  <!-- Step 2: Broadcast to MMs -->
  <circle cx="400" cy="190" r="14" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="400" y="194" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">2</text>
  <line x1="418" y1="190" x2="644" y2="190" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="530" y="183" text-anchor="middle" font-size="10" fill="#059669" font-weight="500">Broadcast RFQ</text>

  <!-- Step 3: Quotes returned -->
  <circle cx="660" cy="230" r="14" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="660" y="234" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">3</text>
  <line x1="644" y1="230" x2="418" y2="230" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="530" y="223" text-anchor="middle" font-size="10" fill="#059669" font-weight="500">Competing quotes</text>
  <text x="530" y="245" text-anchor="middle" font-size="9" fill="#6B7280">Best price wins</text>

  <!-- Step 4: Best quote to app -->
  <circle cx="400" cy="270" r="14" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="400" y="274" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">4</text>
  <line x1="384" y1="270" x2="158" y2="270" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <text x="270" y="263" text-anchor="middle" font-size="10" fill="#2563EB" font-weight="500">Best quote</text>

  <!-- Step 5: Execute -->
  <circle cx="140" cy="310" r="14" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="140" y="314" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">5</text>
  <line x1="158" y1="310" x2="384" y2="310" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <text x="270" y="303" text-anchor="middle" font-size="10" fill="#2563EB" font-weight="500">Execute + signature</text>

  <!-- Step 6: Settlement -->
  <circle cx="400" cy="350" r="14" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="354" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">6</text>
  <line x1="384" y1="350" x2="158" y2="350" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="270" y="343" text-anchor="middle" font-size="10" fill="#059669" font-weight="500">On-chain settlement ✓</text>
  <text x="270" y="365" text-anchor="middle" font-size="9" fill="#6B7280">Tokens arrive in wallet</text>
</svg>
