<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow3" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGrey" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <rect width="800" height="320" fill="#F9FAFB" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#111827" font-family="Space Grotesk, sans-serif">Settlement Flow — USDC → EURC Swap</text>

  <!-- Step 1: User -->
  <rect x="30" y="70" width="120" height="80" rx="12" fill="#FFF" stroke="#2563EB" stroke-width="2" filter="url(#shadow3)"/>
  <text x="90" y="100" text-anchor="middle" font-size="20">👤</text>
  <text x="90" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">You</text>
  <text x="90" y="136" text-anchor="middle" font-size="9" fill="#6B7280">1,000 USDC</text>

  <!-- Arrow 1 -->
  <line x1="155" y1="110" x2="195" y2="110" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="175" y="100" text-anchor="middle" font-size="8" fill="#2563EB" font-weight="600">1</text>

  <!-- Step 2: Router -->
  <rect x="200" y="70" width="120" height="80" rx="12" fill="#EFF6FF" stroke="#2563EB" stroke-width="2" filter="url(#shadow3)"/>
  <text x="260" y="100" text-anchor="middle" font-size="20">🔀</text>
  <text x="260" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#1D4ED8">Router</text>
  <text x="260" y="136" text-anchor="middle" font-size="9" fill="#6B7280">Check access + route</text>

  <!-- Arrow 2 -->
  <line x1="325" y1="110" x2="365" y2="110" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="345" y="100" text-anchor="middle" font-size="8" fill="#2563EB" font-weight="600">2</text>

  <!-- Step 3: Oracle -->
  <rect x="370" y="70" width="120" height="80" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2" filter="url(#shadow3)"/>
  <text x="430" y="100" text-anchor="middle" font-size="20">📡</text>
  <text x="430" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Oracle</text>
  <text x="430" y="136" text-anchor="middle" font-size="9" fill="#B45309">EUR/USD = 1.0870</text>

  <!-- Arrow 3 -->
  <line x1="495" y1="110" x2="535" y2="110" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="515" y="100" text-anchor="middle" font-size="8" fill="#2563EB" font-weight="600">3</text>

  <!-- Step 4: Pools -->
  <rect x="540" y="56" width="140" height="48" rx="10" fill="#FFF" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="610" y="78" text-anchor="middle" font-size="10" font-weight="600" fill="#1D4ED8">USD Hub</text>
  <text x="610" y="94" text-anchor="middle" font-size="9" fill="#6B7280">Receives USDC</text>

  <rect x="540" y="112" width="140" height="48" rx="10" fill="#FFF" stroke="#059669" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="610" y="134" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">EUR Pool</text>
  <text x="610" y="150" text-anchor="middle" font-size="9" fill="#6B7280">Sends EURC</text>

  <!-- Arrow 4 -->
  <line x1="685" y1="110" x2="715" y2="110" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="100" text-anchor="middle" font-size="8" fill="#2563EB" font-weight="600">4</text>

  <!-- Step 5: Output -->
  <rect x="720" y="70" width="60" height="80" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="2" filter="url(#shadow3)"/>
  <text x="750" y="100" text-anchor="middle" font-size="20">✅</text>
  <text x="750" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">Done</text>
  <text x="750" y="136" text-anchor="middle" font-size="8" fill="#6B7280">919 EURC</text>

  <!-- Timeline bar -->
  <rect x="80" y="200" width="640" height="40" rx="20" fill="#F3F4F6"/>
  <rect x="80" y="200" width="640" height="40" rx="20" fill="#2563EB" opacity="0.1"/>
  <text x="400" y="224" text-anchor="middle" font-size="12" font-weight="600" fill="#2563EB">Single transaction · Single block · ~12 seconds</text>

  <!-- Comparison row -->
  <rect x="80" y="260" width="640" height="40" rx="12" fill="#FFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="120" y="284" font-size="11" fill="#9CA3AF">Compare:</text>
  <text x="230" y="284" font-size="11" fill="#9CA3AF">Bank wire = 1-3 days</text>
  <text x="420" y="284" font-size="11" fill="#9CA3AF">OTC desk = hours</text>
  <text x="590" y="284" font-size="11" font-weight="600" fill="#2563EB">BlankFX = seconds</text>
</svg>
