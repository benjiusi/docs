<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="greyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="460" fill="#F9FAFB" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#111827" font-family="Space Grotesk, sans-serif">BlankFX Architecture</text>

  <!-- Router box -->
  <rect x="275" y="56" width="250" height="64" rx="12" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="400" y="84" text-anchor="middle" font-size="15" font-weight="600" fill="#FFF">BlankFX Router</text>
  <text x="400" y="104" text-anchor="middle" font-size="11" fill="#DBEAFE">Swap entry point — routes all trades</text>

  <!-- Connection lines from Router -->
  <line x1="330" y1="120" x2="160" y2="180" stroke="#D1D5DB" stroke-width="2"/>
  <line x1="400" y1="120" x2="400" y2="180" stroke="#D1D5DB" stroke-width="2"/>
  <line x1="470" y1="120" x2="640" y2="180" stroke="#D1D5DB" stroke-width="2"/>

  <!-- USD Hub -->
  <rect x="60" y="180" width="200" height="120" rx="12" fill="#FFF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="180" width="200" height="36" rx="12" fill="#EFF6FF"/>
  <rect x="60" y="204" width="200" height="2" fill="#DBEAFE"/>
  <text x="160" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">USD Hub</text>
  <circle cx="100" cy="236" r="14" fill="#2563EB"/>
  <text x="100" y="240" text-anchor="middle" font-size="9" font-weight="700" fill="#FFF">$</text>
  <text x="122" y="240" font-size="11" fill="#374151">USDC</text>
  <circle cx="100" cy="266" r="14" fill="#2563EB"/>
  <text x="100" y="270" text-anchor="middle" font-size="9" font-weight="700" fill="#FFF">$</text>
  <text x="122" y="270" font-size="11" fill="#374151">USDT</text>
  <circle cx="180" cy="236" r="14" fill="#2563EB"/>
  <text x="180" y="240" text-anchor="middle" font-size="9" font-weight="700" fill="#FFF">$</text>
  <text x="202" y="240" font-size="11" fill="#374151">RLUSD</text>

  <!-- EUR Pool -->
  <rect x="300" y="180" width="200" height="120" rx="12" fill="#FFF" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <rect x="300" y="180" width="200" height="36" rx="12" fill="#ECFDF5"/>
  <rect x="300" y="204" width="200" height="2" fill="#D1FAE5"/>
  <text x="400" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">EUR Pool</text>
  <circle cx="370" cy="248" r="18" fill="#059669"/>
  <text x="370" y="253" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">€</text>
  <text x="396" y="253" font-size="12" fill="#374151">EURC</text>

  <!-- Future Pools -->
  <rect x="540" y="180" width="200" height="120" rx="12" fill="#FFF" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6,4" filter="url(#shadow)"/>
  <rect x="540" y="180" width="200" height="36" rx="12" fill="#F9FAFB"/>
  <rect x="540" y="204" width="200" height="2" fill="#E5E7EB"/>
  <text x="640" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#6B7280">Future Pools</text>
  <text x="640" y="244" text-anchor="middle" font-size="12" fill="#9CA3AF">CHF · GBP · AUD</text>
  <text x="640" y="264" text-anchor="middle" font-size="11" fill="#9CA3AF">Coming soon</text>

  <!-- Oracle box -->
  <rect x="60" y="340" width="200" height="64" rx="12" fill="#FFF" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="92" cy="372" r="16" fill="#FEF3C7"/>
  <text x="92" y="377" text-anchor="middle" font-size="14">📡</text>
  <text x="170" y="366" text-anchor="middle" font-size="13" font-weight="600" fill="#92400E">Oracle Feeds</text>
  <text x="170" y="384" text-anchor="middle" font-size="11" fill="#B45309">Real-time FX rates</text>

  <!-- Access Control box -->
  <rect x="300" y="340" width="200" height="64" rx="12" fill="#FFF" stroke="#7C3AED" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="332" cy="372" r="16" fill="#EDE9FE"/>
  <text x="332" y="377" text-anchor="middle" font-size="14">🔐</text>
  <text x="410" y="366" text-anchor="middle" font-size="13" font-weight="600" fill="#5B21B6">Access Control</text>
  <text x="410" y="384" text-anchor="middle" font-size="11" fill="#7C3AED">Tiered permissions</text>

  <!-- Settlement box -->
  <rect x="540" y="340" width="200" height="64" rx="12" fill="#FFF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="572" cy="372" r="16" fill="#EFF6FF"/>
  <text x="572" y="377" text-anchor="middle" font-size="14">⚡</text>
  <text x="650" y="366" text-anchor="middle" font-size="13" font-weight="600" fill="#1D4ED8">Settlement</text>
  <text x="650" y="384" text-anchor="middle" font-size="11" fill="#2563EB">Atomic, single-block</text>

  <!-- Dotted lines to bottom row -->
  <line x1="160" y1="300" x2="160" y2="340" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="300" x2="400" y2="340" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="640" y1="300" x2="640" y2="340" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Footer label -->
  <text x="400" y="440" text-anchor="middle" font-size="10" fill="#9CA3AF">All swaps are atomic — single transaction, single block, no partial fills</text>
</svg>
