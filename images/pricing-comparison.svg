<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow2" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="380" fill="#F9FAFB" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#111827" font-family="Space Grotesk, sans-serif">Pricing: AMM vs BlankFX</text>

  <!-- AMM Side -->
  <rect x="30" y="56" width="360" height="290" rx="12" fill="#FFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow2)"/>
  <rect x="30" y="56" width="360" height="44" rx="12" fill="#FEF2F2"/>
  <rect x="30" y="88" width="360" height="2" fill="#FECACA"/>
  <text x="210" y="84" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626">Traditional AMM</text>

  <!-- AMM chart area - showing price impact curve -->
  <rect x="60" y="110" width="300" height="140" rx="8" fill="#FAFAFA" stroke="#F3F4F6" stroke-width="1"/>
  <!-- Axis labels -->
  <text x="210" y="262" text-anchor="middle" font-size="10" fill="#9CA3AF">Trade size →</text>
  <text x="48" y="180" text-anchor="middle" font-size="10" fill="#9CA3AF" transform="rotate(-90,48,180)">Rate</text>
  <!-- Price impact curve (gets worse with size) -->
  <path d="M 80 130 Q 150 132 200 148 Q 260 168 310 210 Q 340 235 340 240" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ideal flat line -->
  <line x1="80" y1="130" x2="340" y2="130" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="345" y="134" font-size="9" fill="#9CA3AF">Mid-rate</text>
  <!-- Labels on curve -->
  <circle cx="140" cy="133" r="4" fill="#EF4444"/>
  <text x="140" y="122" text-anchor="middle" font-size="9" fill="#6B7280">$100</text>
  <circle cx="260" cy="165" r="4" fill="#EF4444"/>
  <text x="260" y="155" text-anchor="middle" font-size="9" fill="#6B7280">$100K</text>
  <circle cx="330" cy="228" r="4" fill="#EF4444"/>
  <text x="315" y="220" text-anchor="middle" font-size="9" fill="#6B7280">$1M</text>

  <!-- AMM bullet points -->
  <text x="70" y="288" font-size="11" fill="#6B7280">✗ Price worsens with trade size</text>
  <text x="70" y="306" font-size="11" fill="#6B7280">✗ MEV/sandwich attack risk</text>
  <text x="70" y="324" font-size="11" fill="#6B7280">✗ Slippage unpredictable</text>

  <!-- BlankFX Side -->
  <rect x="410" y="56" width="360" height="290" rx="12" fill="#FFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow2)"/>
  <rect x="410" y="56" width="360" height="44" rx="12" fill="#EFF6FF"/>
  <rect x="410" y="88" width="360" height="2" fill="#BFDBFE"/>
  <text x="590" y="84" text-anchor="middle" font-size="14" font-weight="700" fill="#2563EB">BlankFX Oracle-Anchored</text>

  <!-- BlankFX chart area - flat line -->
  <rect x="440" y="110" width="300" height="140" rx="8" fill="#FAFAFA" stroke="#F3F4F6" stroke-width="1"/>
  <!-- Axis labels -->
  <text x="590" y="262" text-anchor="middle" font-size="10" fill="#9CA3AF">Trade size →</text>
  <text x="428" y="180" text-anchor="middle" font-size="10" fill="#9CA3AF" transform="rotate(-90,428,180)">Rate</text>
  <!-- Oracle rate line (flat!) -->
  <line x1="460" y1="155" x2="720" y2="155" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mid-rate reference -->
  <line x1="460" y1="130" x2="720" y2="130" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="725" y="134" font-size="9" fill="#9CA3AF">Mid-rate</text>
  <text x="725" y="159" font-size="9" fill="#2563EB">Your rate</text>
  <!-- Spread area -->
  <rect x="460" y="130" width="260" height="25" fill="#2563EB" opacity="0.06" rx="2"/>
  <text x="590" y="144" text-anchor="middle" font-size="9" fill="#2563EB">Fixed spread</text>
  <!-- Labels on line -->
  <circle cx="500" cy="155" r="4" fill="#2563EB"/>
  <text x="500" y="174" text-anchor="middle" font-size="9" fill="#6B7280">$100</text>
  <circle cx="600" cy="155" r="4" fill="#2563EB"/>
  <text x="600" y="174" text-anchor="middle" font-size="9" fill="#6B7280">$100K</text>
  <circle cx="700" cy="155" r="4" fill="#2563EB"/>
  <text x="700" y="174" text-anchor="middle" font-size="9" fill="#6B7280">$1M</text>

  <!-- BlankFX bullet points -->
  <text x="450" y="288" font-size="11" fill="#374151">✓ Same rate regardless of size</text>
  <text x="450" y="306" font-size="11" fill="#374151">✓ No MEV or frontrunning</text>
  <text x="450" y="324" font-size="11" fill="#374151">✓ Predictable, transparent pricing</text>
</svg>
